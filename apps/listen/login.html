<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard - Login</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149;
    --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 40px; width: 100%; max-width: 400px; box-shadow: var(--shadow);
  }
  .login-card h1 {
    font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; text-align: center;
  }
  .login-card p {
    color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 24px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; font-weight: 500;
  }
  .form-group input {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.95rem; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(248,81,73,0.1); border: 1px solid var(--red); color: var(--red);
    padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 16px;
    display: none; text-align: center;
  }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--green); margin-right: 8px; }
</style>
</head>
<body>
  <div class="login-card">
    <h1><span class="dot"></span>Agent Dashboard</h1>
    <p>Sign in to continue</p>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('error');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        if (resp.ok) {
          window.location.href = '/dashboard';
        } else {
          const data = await resp.json();
          err.textContent = data.detail || 'Invalid credentials';
          err.style.display = 'block';
        }
      } catch (ex) {
        err.textContent = 'Connection error';
        err.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  </script>
</body>
</html>
